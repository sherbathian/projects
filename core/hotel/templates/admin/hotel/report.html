{% extends "admin/base_site.html" %}
{% block content %}
<h1>Rent Reports</h1>

<p>
  <strong>Selected Filters:</strong>
  Year: {{ selected_year|default:"Any" }} &nbsp;|&nbsp;
  Location: {{ selected_location|default:"Any" }}
</p>

<form method="get" style="margin-bottom:20px;">
    <label for="year">Year:</label>
    <select name="year" id="year" onchange="this.form.submit()">
        <option value="any" {% if selected_year == 'any' %}selected{% endif %}>Any</option>
        {% for y in years %}
            <option value="{{ y }}" {% if selected_year == y|stringformat:"s" %}selected{% endif %}>{{ y }}</option>
        {% endfor %}
    </select>

    <label for="location">Location:</label>
    <select name="location" id="location" onchange="this.form.submit()">
        <option value="any" {% if selected_location == 'any' %}selected{% endif %}>Any</option>
        {% for loc_val, loc_name in locations %}
            <option value="{{ loc_val }}" {% if selected_location == loc_val %}selected{% endif %}>{{ loc_name }}</option>
        {% endfor %}
    </select>
</form>

<div style="margin-bottom:8px;">
    <button id="exportPdf" type="button">Export PDF</button>
</div>

<table class="results">
    <thead>
        <tr>
            <th>Location</th>
            <th>Year</th>
            <th>Month</th>
            <th>Amount</th>
        </tr>
    </thead>
    <tbody id="ledgerBody">
        <!-- rows will be populated by JS -->
    </tbody>
    <tfoot>
        <tr>
            <th colspan="3" style="text-align:right;">Totals:</th>
            <th id="totalAmount">{{ total_amount }}</th>
        </tr>
    </tfoot>
</table>

<div style="width:100%;max-width:800px;">
    <canvas id="saddqahChart"></canvas>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const rows = {{ rows|safe }};

// Payment Chart
const locationColors = {
    'Second Floor': 'rgba(54, 162, 235, 0.5)',
    'Second Floor Cabinet': 'rgba(255, 99, 132, 0.5)',
    'Third Floor': 'rgba(75, 192, 192, 0.5)',
    'Third Floor Cabinet': 'rgba(255, 205, 86, 0.5)'
};

new Chart(document.getElementById('saddqahChart'), {
    type: 'bar',
    data: {
        labels: rows.map(r => `${r.location} - ${r.month} ${r.year}`),
        datasets: [{
            label: 'Total Rent Amount by Location and Month',
            data: rows.map(r => r.amount),
            backgroundColor: rows.map(r => locationColors[r.location] || 'rgba(153, 102, 255, 0.5)')
        }]
    },
    options: {
        responsive: true,
        scales: {
            x: { stacked: false },
            y: { beginAtZero: true }
        }
    }
});

// populate table rows
(function populateTable(){
    const tbody = document.getElementById('ledgerBody');
    tbody.innerHTML = '';
    rows.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.location}</td><td>${r.year}</td><td>${r.month}</td><td style="text-align:right;">${r.amount}</td>`;
        tbody.appendChild(tr);
    });
})();

// export PDF button: navigate to export endpoint preserving query string
document.getElementById('exportPdf').addEventListener('click', function(){
    const base = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
    const exportUrl = base + 'export_pdf/' + window.location.search;
    window.location.href = exportUrl;
});
</script>
{% endblock %}
